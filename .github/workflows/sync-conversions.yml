name: Sync affiliate conversions to Google Ads

# Runs daily and uploads confirmed Profitshare commissions (that carry a gclid)
# to Google Ads as offline conversions. Fully automatic — no manual CSV.
#
# Add these repository secrets first (Settings → Secrets and variables → Actions):
#   PROFITSHARE_API_USER, PROFITSHARE_API_KEY
#   GOOGLE_ADS_DEVELOPER_TOKEN
#   GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET, GOOGLE_OAUTH_REFRESH_TOKEN
#   GOOGLE_ADS_CUSTOMER_ID, GOOGLE_ADS_CONVERSION_ACTION_ID
#   (optional) GOOGLE_ADS_LOGIN_CUSTOMER_ID

on:
  schedule:
    - cron: '0 4 * * *' # every day at 04:00 UTC (~07:00 RO)
  workflow_dispatch: {}   # allow manual run from the Actions tab

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Upload conversions
        env:
          PROFITSHARE_API_USER: ${{ secrets.PROFITSHARE_API_USER }}
          PROFITSHARE_API_KEY: ${{ secrets.PROFITSHARE_API_KEY }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_CONVERSION_ACTION_ID: ${{ secrets.GOOGLE_ADS_CONVERSION_ACTION_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: node scripts/upload-conversions.mjs
